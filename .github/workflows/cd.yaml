name: CD - Build, Push, Deploy to Minikube

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - auth-service
          - api-service
          - frontend-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:${{ github.sha }} \
            -t ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:latest \
            ./${{ matrix.service }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:${{ github.sha }}
          docker push ghcr.io/${{ env.OWNER }}/${{ matrix.service }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set lowercase owner
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "OWNER=$OWNER" >> $GITHUB_ENV

      - name: SSH into EC2 and deploy to Minikube
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Starting Minikube..."
            minikube start --driver=docker --memory=2200mb --cpus=2

            echo "Waiting for Kubernetes node..."
            kubectl wait --for=condition=Ready node/minikube --timeout=180s

            echo "Checking cluster..."
            minikube status
            kubectl get nodes

            cd ~/cicd-microservices-k8s-demo
            git pull origin main

            echo "Applying namespace..."
            kubectl apply -f k8s/namespace.yaml

            echo "Applying Kubernetes manifests..."
            kubectl apply -f k8s/auth-secret.yaml
            kubectl apply -f k8s/api-config.yaml
            kubectl apply -f k8s/auth-service.yaml
            kubectl apply -f k8s/api-service.yaml
            kubectl apply -f k8s/frontend-service.yaml
            kubectl apply -f k8s/auth-deployment.yaml
            kubectl apply -f k8s/api-deployment.yaml
            kubectl apply -f k8s/frontend-deployment.yaml

            echo "Updating deployment images..."
            kubectl set image deployment/auth-deployment \
              auth-service=ghcr.io/${{ env.OWNER }}/auth-service:${{ github.sha }} \
              -n microservices

            kubectl set image deployment/api-deployment \
              api-service=ghcr.io/${{ env.OWNER }}/api-service:${{ github.sha }} \
              -n microservices

            kubectl set image deployment/frontend-deployment \
              frontend-service=ghcr.io/${{ env.OWNER }}/frontend-service:${{ github.sha }} \
              -n microservices

            echo "Waiting for rollouts..."
            kubectl rollout status deployment/auth-deployment -n microservices --timeout=180s
            kubectl rollout status deployment/api-deployment -n microservices --timeout=180s
            kubectl rollout status deployment/frontend-deployment -n microservices --timeout=180s

            echo "Forwarding frontend service port..."
            pkill -f "kubectl port-forward.*frontend-service.*8080:80" || true
            nohup kubectl port-forward \
              --address 0.0.0.0 \
              -n microservices \
              service/frontend-service \
              8080:80 \
              > /tmp/frontend-service-port-forward.log 2>&1 &

            kubectl get pods -n microservices
            kubectl get svc -n microservices
